name: Audit

on:
  pull_request:
  push:
    branches:
      - development
      - master
  schedule:
    - cron: '0 12 * * 1'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.17.0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `--prod` scopes the audit to the runtime dependency tree. pnpm's `dev: true`
      # flag is unreliable in workspaces, so `--prod` is the reliable way to isolate
      # advisories that actually ship to the browser/server bundle.
      #
      # Current level: `high`. Expected to fail until APP-223/224/225 (Waves 2-4) merge.
      # `continue-on-error` keeps this visible without blocking merges while the
      # remaining advisories are worked through. Flip to required (remove
      # `continue-on-error`) once `pnpm audit --prod --audit-level high` exits 0.
      - name: pnpm audit (runtime, high+)
        continue-on-error: true
        run: pnpm audit --prod --audit-level high
